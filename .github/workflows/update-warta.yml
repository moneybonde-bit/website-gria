name: Update Warta & Ulang Tahun dari Google Sheet

"on":
  schedule:
    # Jalan otomatis setiap 6 jam (UTC). Sesuaikan jika ingin lebih sering/jarang.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
    # Memungkinkan klik tombol "Run workflow" manual di tab Actions GitHub

permissions:
  contents: write

jobs:
  update-konten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Jalankan script update warta
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SPREADSHEET_ID: '1QJZf9hmfc5IQe5VE6OpHlLTmegBRhqyQq0wupx8z8fY'
        run: python update_warta.py

      - name: Jalankan script update ulang tahun
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SPREADSHEET_ID: '1QJZf9hmfc5IQe5VE6OpHlLTmegBRhqyQq0wupx8z8fY'
        run: python update_ulang_tahun.py

      - name: Commit & push jika ada perubahan
        run: |
          git config user.name "GRIA Auto Update Bot"
          git config user.email "actions@github.com"
          git add warta.html index.html komunitas.html
          git diff --cached --quiet || git commit -m "Auto-update warta.html, index.html & ulang tahun komunitas.html dari Google Sheet"
          git pull --rebase origin main
          git push
