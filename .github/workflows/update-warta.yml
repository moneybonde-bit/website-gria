name: Update Warta & Ulang Tahun dari Google Sheet

"on":
  schedule:
    # Jalan otomatis setiap 6 jam (UTC). Sesuaikan jika ingin lebih sering/jarang.
    - cron: '0 */6 * * *'
  workflow_dispatch: {}
    # Memungkinkan klik tombol "Run workflow" manual di tab Actions GitHub

permissions:
  contents: write

jobs:
  update-konten:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Update konten & push (dengan retry aman dari race condition)
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SPREADSHEET_ID: '1QJZf9hmfc5IQe5VE6OpHlLTmegBRhqyQq0wupx8z8fY'
        run: |
          git config user.name "GRIA Auto Update Bot"
          git config user.email "actions@github.com"

          # Regenerasi ulang dari main terbaru di tiap percobaan, bukan rebase,
          # supaya tidak ada conflict kalau ada commit lain (mis. merge PR) yang
          # masuk ke main persis saat job ini jalan.
          for attempt in 1 2 3 4 5; do
            echo "=== Percobaan ke-$attempt ==="
            git fetch origin main
            git reset --hard origin/main

            python update_warta.py
            python update_ulang_tahun.py

            git add warta.html index.html
            if git diff --cached --quiet; then
              echo "Tidak ada perubahan, selesai."
              exit 0
            fi

            git commit -m "Auto-update warta.html & index.html dari Google Sheet (termasuk ulang tahun)"

            if git push origin HEAD:main; then
              echo "Push berhasil."
              exit 0
            fi

            echo "Push gagal (kemungkinan race dengan commit lain), fetch ulang & coba lagi..."
            sleep $((attempt * 5))
          done

          echo "Gagal push setelah beberapa percobaan."
          exit 1
